<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        /* ================= HISTORY PAGE ================= */

        .history-container {
            padding: 30px;
            margin-left: 240px;
        }

        .history-title {
            font-size: 38px;
            color: #ffffff;
            margin-bottom: 25px;

            text-shadow:
                0 0 10px #a259ff,
                0 0 20px #ff4df0;
        }

        /* ================= SUMMARY CARDS ================= */

        .summary-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .summary-card {
            flex: 1;
            min-width: 220px;

            padding: 20px;
            border-radius: 15px;

            background: rgba(20, 0, 40, 0.45);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(162, 89, 255, 0.5);

            box-shadow:
                0 0 20px rgba(162, 89, 255, 0.3),
                0 0 40px rgba(255, 77, 240, 0.2);

            text-align: center;

            transition: 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);

            box-shadow:
                0 0 25px #a259ff,
                0 0 50px #ff4df0;
        }

        .summary-card h2 {
            font-size: 42px;
            margin: 10px 0;
        }

        .summary-card p {
            color: #d7bfff;
            letter-spacing: 1px;
        }

        .high-card h2 {
            color: #ff4d6d;
            text-shadow: 0 0 10px #ff4d6d;
        }

        .medium-card h2 {
            color: #ffb84d;
            text-shadow: 0 0 10px #ffb84d;
        }

        .low-card h2 {
            color: #4dff88;
            text-shadow: 0 0 10px #4dff88;
        }

        /* ================= CHART ================= */

        .chart-box {
            padding: 25px;
            border-radius: 18px;

            background: rgba(20, 0, 40, 0.45);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(162, 89, 255, 0.4);

            box-shadow:
                0 0 20px rgba(162, 89, 255, 0.3),
                0 0 40px rgba(255, 77, 240, 0.2);

            margin-bottom: 40px;
        }

        .chart-box h3 {
            color: #ffffff;
            margin-bottom: 20px;

            text-shadow:
                0 0 10px #a259ff;
        }

        #vulnChart {
            width: 100% !important;
            max-height: 350px;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2 class="logo">SCANNER</h2>

    <a href="/dashboard">Dashboard</a>
    <a href="/history">History</a>
    <a href="/profile">Profile</a>
    <a href="/logout" class="logout">Logout</a>

</div>

<!-- MAIN -->
<div class="history-container">

    <h1 class="history-title">Scan History Analytics</h1>

    <!-- SUMMARY -->
    <div class="summary-grid">

        <div class="summary-card high-card">
            <p>HIGH</p>
            <h2>{{ summary.high }}</h2>
        </div>

        <div class="summary-card medium-card">
            <p>MEDIUM</p>
            <h2>{{ summary.medium }}</h2>
        </div>

        <div class="summary-card low-card">
            <p>LOW</p>
            <h2>{{ summary.low }}</h2>
        </div>

    </div>

    <!-- CHART -->
    <div class="chart-box">

        <h3>Vulnerability Overview</h3>

        <canvas id="vulnChart"></canvas>

    </div>

</div>

<!-- JSON DATA -->
<script id="summary-data" type="application/json">
    {{ summary | tojson }}
</script>

<!-- CHART SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const ctx = document.getElementById("vulnChart");

    const raw = document.getElementById("summary-data").textContent;

    let summaryData = {};

    try {
        summaryData = JSON.parse(raw);
    } catch (e) {
        console.error("JSON parse error:", e);
    }

    new Chart(ctx, {
        type: "bar",

        data: {
            labels: ["High", "Medium", "Low"],

            datasets: [{
                label: "Vulnerabilities",

                data: [
                    summaryData.high || 0,
                    summaryData.medium || 0,
                    summaryData.low || 0
                ],

                borderWidth: 2,
                borderRadius: 10
            }]
        },

        options: {

            responsive: true,

            plugins: {
                legend: {
                    labels: {
                        color: "#ffffff"
                    }
                }
            },

            scales: {

                x: {
                    ticks: {
                        color: "#ffffff"
                    },

                    grid: {
                        color: "rgba(255,255,255,0.1)"
                    }
                },

                y: {
                    beginAtZero: true,

                    ticks: {
                        color: "#ffffff"
                    },

                    grid: {
                        color: "rgba(255,255,255,0.1)"
                    }
                }
            }
        }
    });

});
</script>

</body>
</html>
